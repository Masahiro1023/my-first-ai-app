<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>英語コーチングアプリ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      padding: 24px 16px 40px;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP",
        "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #0f172a;
      background: #fdf2f8;
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      letter-spacing: 0.02em;
    }

    textarea {
      width: 100%;
      max-width: 100%;
      min-height: 120px;
      padding: 12px 14px;
      font-size: 16px;
      line-height: 1.5;
      border-radius: 12px;
      border: 1px solid #f9a8d4;
      background: #ffffff;
      color: inherit;
      box-sizing: border-box;
      display: block;
      margin: 0 auto 12px;
      resize: vertical;
    }

    textarea:focus-visible {
      outline: 3px solid rgba(236, 72, 153, 0.28);
      outline-offset: 2px;
    }

    button {
      background: #ec4899;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      display: inline-block;
      margin: 0 auto;
      min-width: 120px;
    }

    button:hover {
      background: #db2777;
    }

    button:active {
      background: #be185d;
    }

    button:focus-visible {
      outline: 3px solid rgba(236, 72, 153, 0.35);
      outline-offset: 3px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #chat {
      margin: 16px auto 0;
      padding: 12px 14px;
      width: 100%;
      max-width: 680px;
      text-align: left;
      background: #ffffff;
      border: 1px solid #f9a8d4;
      border-radius: 12px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
      font-size: 15px;
    }

    .msg.user {
      align-self: flex-end;
      background: #fce7f3;
      border: 1px solid #f9a8d4;
    }

    .msg.ai {
      align-self: flex-start;
      background: #fdf2f8;
      border: 1px solid #f9a8d4;
    }

    .msg.error {
      align-self: flex-start;
      background: #fee2e2;
      border: 1px solid #fecaca;
    }

    .mode-select {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      justify-content: center;
      margin-bottom: 12px;
    }

    .mode-select label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 15px;
    }

    .mode-select input {
      width: 18px;
      height: 18px;
    }

    .input-desc {
      margin: 0 auto 12px;
      width: 100%;
      max-width: 680px;
      text-align: left;
      font-size: 14px;
      color: #64748b;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px 12px 32px;
        padding-bottom: max(32px, env(safe-area-inset-bottom));
      }

      h1 {
        font-size: 20px;
        margin-bottom: 12px;
      }

      .mode-select {
        gap: 10px 16px;
        margin-bottom: 10px;
      }

      .mode-select label {
        font-size: 14px;
      }

      .input-desc {
        font-size: 13px;
        margin-bottom: 10px;
      }

      textarea {
        min-height: 100px;
        padding: 10px 12px;
        font-size: 16px;
        margin-bottom: 10px;
      }

      button {
        padding: 14px 24px;
        font-size: 16px;
        min-width: 100%;
      }

      #chat {
        margin-top: 12px;
        padding: 10px 12px;
        gap: 8px;
        border-radius: 10px;
      }

      .msg {
        max-width: 90%;
        padding: 10px 12px;
        font-size: 15px;
      }
    }

    /* ボタン横並びレイアウト */
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 0 auto;
    }

    /* クイズボタンは紫色 */
    #quizButton {
      background: #7c3aed;
    }
    #quizButton:hover { background: #6d28d9; }
    #quizButton:active { background: #5b21b6; }

  </style>
</head>
<body>
  <h1>英語コーチングアプリ</h1>

  <div class="mode-select">
    <label>
      <input type="radio" name="mode" value="correct" checked> 添削モード
    </label>
    <label>
      <input type="radio" name="mode" value="explain"> 説明モード
    </label>
    <label>
      <input type="radio" name="mode" value="conversation"> 会話練習モード
    </label>
  </div>

  <p id="inputDesc" class="input-desc">英語を入力→添削。日本語を入力→英訳します。</p>

  <textarea id="message" placeholder="英語を入力…"></textarea>
  <br>

  <div class="button-row">
  <button id="sendButton" onclick="sendMessage()">送信</button>
  <button id="quizButton" onclick="startQuiz()">🎯 クイズを出す</button>
  </div>

  <div id="chat" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "english-coach-chat";
    const MODE_DESCS = {
      correct: "英語を入力→添削。日本語を入力→英訳します。",
      explain: "英語の文法・単語・表現について質問してください。わかりやすく説明します。",
      conversation: "英語で自由に話してみましょう。会話の練習相手になります。"
    };

    function loadHistory() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    const MAX_TURNS = 20;

    function saveHistory(messages) {
      const trimmed = messages.length > MAX_TURNS ? messages.slice(-MAX_TURNS) : messages;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed));
    }

    function updateInputDesc() {
      const mode = document.querySelector('input[name="mode"]:checked')?.value || "correct";
      document.getElementById("inputDesc").textContent = MODE_DESCS[mode];

      async function startQuiz() {
      const sendButton = document.getElementById("sendButton");
      const quizButton = document.getElementById("quizButton");

      quizButton.disabled = true;
      sendButton.disabled = true;

      const pending = appendMessage("ai", "問題を作っています...");

      try {
        const res = await fetch("/api/quiz/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
        });
        const data = await res.json();
        pending.remove();

        currentQuiz = { ja: data.question };
        appendQuizQuestion(data.question);

        const textarea = document.getElementById("message");
        textarea.value = "";
        textarea.placeholder = "英語で答えを入力して「送信」してください…";
        textarea.focus();
      } catch (e) {
        pending.remove();
        appendMessage("error", "問題の生成に失敗しました。もう一度お試しください。");
        currentQuiz = null;
      } finally {
        quizButton.disabled = false;
        sendButton.disabled = false;
      }
    }

    }

    document.querySelectorAll('input[name="mode"]').forEach((el) => {
      el.addEventListener("change", updateInputDesc);
    });

    function appendMessage(role, text) {
      const chat = document.getElementById("chat");
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.innerText = text;
      chat.appendChild(el);
      el.scrollIntoView({ behavior: "smooth", block: "end" });
      return el;
    }

    let messages = loadHistory();
    messages.forEach((turn) => {
      appendMessage("user", turn.user);
      appendMessage("ai", turn.ai);
    });

    async function sendMessage() {
      const textarea = document.getElementById("message");
      const button = document.getElementById("sendButton");
      const message = textarea.value.trim();
      if (!message) return;

      appendMessage("user", message);
      textarea.value = "";
      textarea.focus();
      button.disabled = true;

      const pending = appendMessage("ai", "考え中...");

      try {
        const mode = document.querySelector('input[name="mode"]:checked')?.value || "correct";
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message, mode, history: messages })
        });

        const data = await res.json();
        const reply = data.reply ?? "";
        pending.innerText = reply;
        messages.push({ user: message, ai: reply });
        if (messages.length > MAX_TURNS) messages = messages.slice(-MAX_TURNS);
        saveHistory(messages);
      } catch (e) {
        pending.remove();
        appendMessage("error", "通信でエラーが発生しました。もう一度お試しください。");
      } finally {
        button.disabled = false;
      }
    }

    document.getElementById("message").addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      if (e.shiftKey) return;
      if (e.isComposing) return;
      e.preventDefault();
      sendMessage();
    });
  </script>
</body>
</html>
